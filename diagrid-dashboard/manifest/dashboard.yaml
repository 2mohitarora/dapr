apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagrid-dashboard
  labels:
    app: diagrid-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagrid-dashboard
  template:
    metadata:
      labels:
        app: diagrid-dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/diagridio/diagrid-dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: COMPONENT_FILE
          value: "/app/config/redis-state.yaml" # Matches the mountPath below
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: diagrid-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: diagrid-dashboard
spec:
  type: ClusterIP
  selector:
    app: diagrid-dashboard
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080