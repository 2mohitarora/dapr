apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagrid-dashboard
  labels:
    app: diagrid-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagrid-dashboard
  template:
    metadata:
      labels:
        app: diagrid-dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/diagridio/diagrid-dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: COMPONENT_FILE
          value: "/app/config/redis-store.yaml" # Matches the mountPath below
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: diagrid-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: diagrid-dashboard
spec:
  type: ClusterIP
  selector:
    app: diagrid-dashboard
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
# 2. RBAC: Allow the dashboard to read the Secret from the K8s API
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: diagrid-secret-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: diagrid-read-secrets
  namespace: default
subjects:
- kind: ServiceAccount
  name: default # Ensure this matches the serviceAccountName in your deployment
  namespace: default
roleRef:
  kind: Role
  name: diagrid-secret-reader
  apiGroup: rbac.authorization.k8s.io