apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default-gateway
  namespace: default
spec:
  gatewayClassName: cilium
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    name: default-http
    port: 80
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dapr-invoke-route
spec:
  parentRefs:
    - name: default-gateway
  rules:
    - matches:
        - path:
            value: /
      backendRefs:
        - name: frontendsvc
          port: 80   