apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--providers.kubernetescrd.allowExternalNameServices=true"
---
apiVersion: v1
kind: Service
metadata:
  name: traefik-dapr-localhost
  namespace: kube-system
spec:
  type: ExternalName
  externalName: localhost
  ports:
  - port: 3500
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dapr-gateway-route
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`genidsvc.ingress`) && (PathPrefix(`/v1.0/invoke`) || PathPrefix(`/v1.0/metadata`))
    kind: Rule
    services:
    - name: traefik-dapr-localhost
      port: 3500