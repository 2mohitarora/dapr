apiVersion: v1
kind: Secret
metadata:
  name: rmq-auth
type: Opaque
stringData:
  RABBITMQ_CONNECTION_STRING: "amqp://admin:admin123@rabbitmq.default.svc.cluster.local:5672"
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_DEFAULT_PASS: "admin123"
---
apiVersion: v1
kind: Pod
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  containers:
  - name: rabbitmq
    image: rabbitmq:4-management-alpine
    ports:
    - containerPort: 5672
    - containerPort: 15672
    envFrom:
    - secretRef:
        name: rmq-auth
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
  - name: amqp
    port: 5672
  - name: management
    port: 15672