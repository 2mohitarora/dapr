# common-values.yaml
# Top-level MTU setting
# 1450 is the standard for 1500-byte physical networks (1500 - 50 bytes for VXLAN)
mtu: 1450

# 1. Cluster Identity (Must be unique per cluster)
cluster:
  name: "cluster-1" # Set per cluster
  id: 1             # Set per cluster (1-255)

# Cluster Mesh & KVStoreMesh (The Scaling Engine)
clustermesh:
  useAPIServer: true
  maxConnectedClusters: 255
  cacheTTL: "15m"
  config:
    enabled: true
  apiserver:
    service:
      type: LoadBalancer # Ensures reachability across VPCs/Regions
    tls:
      auto:
        enabled: true
        method: certmanager # Best for 2026/2027 automated rotation
        certManagerIssuerRef:
          group: cert-manager.io
          kind: ClusterIssuer
          name: cilium-ca-issuer # Matches the name in the YAML above
  kvstoremesh:
    enabled: true
  enableEndpointSliceSynchronization: true
  # MCS-API: The "Push" model for global services
  mcsapi:
    enabled: true
    corednsAutoConfigure:
      enabled: false

# Enable CiliumEndpointSlice to reduce API server load in large clusters
ciliumEndpointSlice:
  enabled: true

# 4. Identity Management (Preventing "Identity Explosion")
# CRITICAL: Exclude high-cardinality labels (timestamps, hashes, etc.)
labels: "k8s:app;k8s:role;k8s:team;k8s:env;k8s:io.kubernetes.pod.namespace"