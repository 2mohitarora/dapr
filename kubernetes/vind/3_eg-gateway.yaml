apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg-gateway
  namespace: default
spec:
  gatewayClassName: eg
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      name: default-http
      port: 80
      protocol: HTTP
---
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dapr-invoke-route
spec:
  parentRefs:
    - name: eg-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1.0/invoke
      backendRefs:
        - name: eg-gateway-dapr
          port: 3500   