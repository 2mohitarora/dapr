apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: dapr-config
  namespace: default
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        pod:
          annotations:
            dapr.io/enabled: "true"
            dapr.io/app-id: "eg-gateway"
            dapr.io/sidecar-listen-addresses: "0.0.0.0"